<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Supabase Test</title><link rel="stylesheet" href="css/style.css"></head><body><div class="admin-wrap"><div class="login"><h2>Supabase Login Test</h2><p>This page only tests whether Supabase login is working.</p><input id="email" type="email" placeholder="Admin Email"><input id="password" type="password" placeholder="Password"><button class="btn btn-gold wide" id="btn">Test Login</button><pre id="out" style="white-space:pre-wrap;margin-top:15px"></pre><p><a href="admin.html">Back to Admin</a></p></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>document.getElementById('btn').onclick=async()=>{const o=document.getElementById('out');try{if(!window.supabaseClient) throw new Error('Supabase client not loaded. Open with Live Server, not file://');const {data,error}=await supabaseClient.auth.signInWithPassword({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value});if(error) throw error;o.textContent='SUCCESS: Login working for '+data.user.email;}catch(e){o.textContent='FAILED: '+e.message;console.error(e);}};</script></body></html>
