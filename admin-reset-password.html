<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Set Admin Password | Buy Commodity</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/v2.1.4-admin-access.css">
</head>
<body>
    <main class="reset-password-page">
        <section class="reset-password-card" aria-labelledby="resetPasswordTitle">
            <a class="brand" href="index.html">
                <img src="assets/header-logo-icon-v3.png" alt="Buy Commodity">
                <div><b>BUY COMMODITY</b><span>Admin Access</span></div>
            </a>
            <h1 id="resetPasswordTitle">Set Your Password</h1>
            <p class="intro" id="resetPasswordIntro">Create a secure password for your BCSPL administrator account.</p>
            <div class="reset-password-state" id="resetPasswordState" role="status" aria-live="polite">Validating your secure link...</div>
            <form class="reset-password-form" id="resetPasswordForm" hidden>
                <label>New Password
                    <input id="newPassword" type="password" autocomplete="new-password" minlength="10" required>
                </label>
                <label>Confirm New Password
                    <input id="confirmPassword" type="password" autocomplete="new-password" minlength="10" required>
                </label>
                <p class="password-guidance">Use at least 10 characters, including an uppercase letter, a lowercase letter and a number.</p>
                <button class="btn btn-gold wide" id="updatePasswordBtn" type="submit">Update Password</button>
            </form>
            <a class="login-link-button" id="returnToLoginLink" href="admin.html">Return to Admin Login</a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/admin-reset-password.js"></script>
</body>
</html>
