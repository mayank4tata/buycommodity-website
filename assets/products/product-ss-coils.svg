<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="Stainless Steel Coils">
<defs>
<linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#0b1114"/><stop offset=".65" stop-color="#1b2328"/><stop offset="1" stop-color="#33220a"/></linearGradient>
